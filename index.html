<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surfing Fantasy League 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ===== TOP NAV ===== -->
    <header class="nav">
      <div class="nav__brand">
        <span class="nav__wave">🏄</span>
        <span class="nav__title"
          >Fantasy Surf League <span class="nav__year">2026</span></span
        >
      </div>
      <button class="nav__burger" id="navBurger" aria-label="Toggle menu">
        &#9776;
      </button>
      <nav class="nav__links" id="navLinks">
        <a href="#/" class="nav__link" data-route="/">Dashboard</a>
        <a href="#/standings" class="nav__link" data-route="/standings"
          >Rankings</a
        >
        <a href="#/leaderboard" class="nav__link" data-route="/leaderboard"
          >Leaderboard</a
        >
        <a href="#/participants" class="nav__link" data-route="/participants"
          >Participants</a
        >
        <a href="#/admin" class="nav__link" data-route="/admin">Admin</a>
      </nav>
    </header>

    <!-- ===== MAIN VIEW CONTAINER ===== -->
    <main id="app" class="app-container">
      <div class="loader" id="pageLoader">
        <div class="loader__spinner"></div>
      </div>
    </main>

    <!-- ===== TOAST NOTIFICATION ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== JS MODULES (order matters — no bundler) ===== -->
    <script src="js/storage.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/participants.js"></script>
    <script src="js/rankings.js"></script>
    <script src="js/router.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
